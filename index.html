<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mood Garden</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="rose-wrapper">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>

    <div class="widget">
      <h1 id="title">How are you feeling?</h1>

      <div class="time-slot" id="slot"></div>

      <div class="characters">
        <button class="mood" data-mood="Peaceful" aria-label="Peaceful">🧘🏽‍♀️</button>
        <button class="mood" data-mood="Happy" aria-label="Happy">🌞</button>
        <button class="mood" data-mood="Inspired" aria-label="Inspired">🦋</button>
        <button class="mood" data-mood="Tired" aria-label="Tired">🌙</button>
        <button class="mood" data-mood="Anxious" aria-label="Thoughtful">☁️</button>
        <button class="mood" data-mood="Sad" aria-label="Sad">🌧️</button>
        <button class="mood" data-mood="Powerful" aria-label="Powerful">👑</button>
      </div>

      <textarea id="note" placeholder="Leave a little note about how you feel..."></textarea>

      <button class="save" onclick="saveMood()">Save Mood</button>

      <div class="saved" id="savedMessage"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
