<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rose Mood Tracker</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #F8E9EC;
      font-family: Garamond, Georgia, serif;
      color: #1E4D3A;
      overflow: hidden;
    }

    .rose-wrapper {
      position: relative;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .petal {
      position: absolute;
      width: 230px;
      height: 170px;
      background: radial-gradient(circle at 30% 30%, #ffd6df, #d88495);
      border-radius: 65% 35% 65% 35%;
      opacity: 0;
      transform-origin: center bottom;
      animation: bloom 1.8s ease forwards;
      z-index: 1;
    }

    .petal:nth-child(1) { --r: 0deg; animation-delay: 0s; }
    .petal:nth-child(2) { --r: 45deg; animation-delay: .12s; }
    .petal:nth-child(3) { --r: 90deg; animation-delay: .24s; }
    .petal:nth-child(4) { --r: 135deg; animation-delay: .36s; }
    .petal:nth-child(5) { --r: 180deg; animation-delay: .48s; }
    .petal:nth-child(6) { --r: 225deg; animation-delay: .60s; }
    .petal:nth-child(7) { --r: 270deg; animation-delay: .72s; }
    .petal:nth-child(8) { --r: 315deg; animation-delay: .84s; }

    @keyframes bloom {
      0% {
        opacity: 0.95;
        transform: rotate(var(--r)) scale(0.15) translateY(0);
      }
      70% {
        opacity: 0.75;
      }
      100% {
        opacity: 0.18;
        transform: rotate(var(--r)) scale(1) translateY(-20px);
      }
    }

    .widget {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 640px;
      padding: 28px;
      border: 1px solid #C9D7CB;
      border-radius: 28px;
      background: #FCEFF2;
      box-sizing: border-box;
      text-align: center;
      animation: revealWidget 1.4s ease forwards;
      animation-delay: 1s;
      opacity: 0;
      transform: scale(0.92);
    }

    @keyframes revealWidget {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 400;
      color: #1E4D3A;
    }

    .time-slot {
      margin-top: 6px;
      font-size: 18px;
      color: #365C4D;
      opacity: 0.9;
    }

    .characters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 22px 0;
    }

    .mood {
      font-size: 32px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 1px solid #C9D7CB;
      background: #FFF8F9;
      color: #1E4D3A;
      cursor: pointer;
      transition: 0.2s;
    }

    .mood:hover,
    .mood.selected {
      background: #E4F0E7;
      transform: scale(1.08);
    }

    textarea {
      width: 100%;
      min-height: 90px;
      border: 1px solid #C9D7CB;
      border-radius: 16px;
      padding: 14px;
      box-sizing: border-box;
      resize: none;
      font-family: Garamond, Georgia, serif;
      font-size: 18px;
      color: #1E4D3A;
      background: #FFF8F9;
      outline: none;
    }

    button.save {
      margin-top: 16px;
      padding: 10px 24px;
      border: none;
      border-radius: 999px;
      background: #1E4D3A;
      color: #FFF8F9;
      font-family: Garamond, Georgia, serif;
      font-size: 18px;
      cursor: pointer;
    }

    button.save:hover {
      background: #2B6A50;
    }

    .saved {
      margin-top: 16px;
      font-size: 16px;
      color: #365C4D;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="rose-wrapper">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>

    <div class="widget">
      <h1>How are you feeling?</h1>
      <div class="time-slot" id="slot"></div>

      <div class="characters">
        <button class="mood" data-mood="Peaceful">🧘🏽‍♀️</button>
        <button class="mood" data-mood="Happy">🌞</button>
        <button class="mood" data-mood="Inspired">🦋</button>
        <button class="mood" data-mood="Tired">🌙</button>
        <button class="mood" data-mood="Anxious">☁️</button>
        <button class="mood" data-mood="Sad">🌧️</button>
        <button class="mood" data-mood="Powerful">👑</button>
      </div>

      <textarea id="note" placeholder="Leave a little note about how you feel..."></textarea>

      <button class="save" onclick="saveMood()">Save Mood</button>

      <div class="saved" id="savedMessage"></div>
    </div>
  </div>

  <script>
    const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/lqwsw3bcxijr2e68f5d5bj9ycyrnvd24";

    let selectedMood = "";
    let selectedCharacter = "";

    function getTimeSlot() {
      const hour = new Date().getHours();
      if (hour < 12) return "Morning";
      if (hour < 18) return "Noon";
      return "Night";
    }

    function getTodayKey() {
      const today = new Date().toISOString().split("T")[0];
      return `${today}-${getTimeSlot()}`;
    }

    function setupWidget() {
      document.getElementById("slot").textContent = `${getTimeSlot()} Check-In`;

      const savedEntry = JSON.parse(localStorage.getItem(getTodayKey()));

      if (savedEntry) {
        selectedMood = savedEntry.mood;
        selectedCharacter = savedEntry.character;
        document.getElementById("note").value = savedEntry.note;

        document.querySelectorAll(".mood").forEach(btn => {
          if (btn.dataset.mood === selectedMood) {
            btn.classList.add("selected");
          }
        });

        document.getElementById("savedMessage").textContent =
          `Saved locally: ${savedEntry.character} ${savedEntry.mood}`;
      }
    }

    document.querySelectorAll(".mood").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".mood").forEach(btn => btn.classList.remove("selected"));
        button.classList.add("selected");
        selectedMood = button.dataset.mood;
        selectedCharacter = button.textContent;
      });
    });

    async function saveMood() {
      const note = document.getElementById("note").value;

      if (!selectedMood) {
        document.getElementById("savedMessage").textContent = "Choose a mood first.";
        return;
      }

      const entry = {
        name: `${selectedCharacter} ${selectedMood} — ${getTimeSlot()} Check-In`,
        character: selectedCharacter,
        mood: selectedMood,
        note: note,
        slot: getTimeSlot(),
        date: new Date().toISOString()
      };

      localStorage.setItem(getTodayKey(), JSON.stringify(entry));

      document.getElementById("savedMessage").textContent = "Saving to Notion...";

      try {
        await fetch(MAKE_WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(entry)
        });

        document.getElementById("savedMessage").textContent =
          `Saved to Notion: ${entry.character} ${entry.mood}`;
      } catch (error) {
        document.getElementById("savedMessage").textContent =
          "Saved on this device, but not sent to Notion.";
        console.error("Webhook error:", error);
      }
    }

    setupWidget();
  </script>
</body>
</html>
